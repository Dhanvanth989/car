<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Macondo Expert Interface</title>
    <style>
        /* Modern CSS to give HTML an "Expert" Application feel */
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; display: flex; height: 100vh; }
        aside { width: 250px; background: #1e293b; padding: 20px; border-right: 1px solid #334155; }
        main { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .canvas-container { background: #000; border-radius: 8px; border: 2px solid #3b82f6; flex-grow: 1; position: relative; }
        canvas { width: 100%; height: 100%; }
        .status-bar { display: flex; justify-content: space-between; font-family: monospace; font-size: 0.8rem; color: #94a3b8; }
        kbd { background: #334155; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <aside>
        <h2>Macondo v1.0</h2>
        <nav>
            <ul style="list-style: none; padding: 0;">
                <li><details open>
                    <summary><b>Project Modules</b></summary>
                    <ul>
                        <li><a href="#" style="color: #60a5fa;">Data Visualization</a></li>
                        <li><a href="#" style="color: #94a3b8;">Hardware Logs</a></li>
                        <li><a href="#" style="color: #94a3b8;">Settings</a></li>
                    </ul>
                </details></li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Expert Graphics Engine</h1>
            <p>Running on HTML5 Canvas API</p>
        </header>

        <section class="canvas-container">
            <canvas id="expertCanvas"></canvas>
        </section>

        <footer class="status-bar">
            <span>STATUS: <span style="color: #22c55e;">CONNECTED</span></span>
            <span>PRESS <kbd>F12</kbd> FOR CONSOLE</span>
            <span>FPS: 60</span>
        </footer>
    </main>

    <script>
        const canvas = document.getElementById('expertCanvas');
        const ctx = canvas.getContext('2d');

        // Expert Tip: Handling Resolution Scaling
        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.onresize = resize;
        resize();

        // An "Expert" visual: A Mathematical Particle System
        let particles = [];
        for(let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#3b82f6';
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>,
